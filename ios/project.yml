name: ApartmentTracker
options:
  bundleIdPrefix: com.apartment
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  ApartmentTracker:
    type: application
    platform: iOS
    sources:
      - path: ApartmentTracker
    settings:
      base:
        INFOPLIST_FILE: ApartmentTracker/Info.plist
        CODE_SIGN_ENTITLEMENTS: ApartmentTracker/ApartmentTracker.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.apartment.tracker
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: ApartmentTracker/ApartmentTracker.entitlements
      properties:
        aps-environment: development
